name: Calibrated intelligence research

on:
  workflow_dispatch:
  # Runs every Monday at 07:00 UTC once trusted.
  # schedule:
  #   - cron: "0 7 * * 1"

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Import recent agent runs
        run: node scripts/import-agent-runs.js

      - name: Run calibrated research worker
        run: node scripts/research-worker-v2.js

      - name: Merge agent evidence into dashboard
        run: node scripts/merge-agent-evidence.js

      - name: Expand ranked bets
        run: node scripts/expand-ranked-bets.js

      - name: Rebuild static site from dashboard data
        run: node scripts/patch-map-from-dashboard.js

      - name: Commit generated intelligence files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/dashboard.json data/evidence-feed.json memory/evidence-ledger.json memory/source-health.json memory/weekly-change-log.md output/review-this-week.md output/agent-ingestion-summary.md
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update calibrated intelligence dashboard data"
            git push
          fi
