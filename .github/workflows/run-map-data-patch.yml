name: Run map data patch

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/patch-map-from-dashboard.js"
      - ".github/workflows/run-map-data-patch.yml"

permissions:
  contents: write

jobs:
  patch-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/patch-map-from-dashboard.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Make opportunity map data-led"
          git push
